name: a11y

on:
  pull_request:
    paths:
      - "src/**"
      - ".storybook/**"
      - "tests/a11y/**"

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx playwright install --with-deps chromium
      - run: pnpm storybook:build
      - name: Serve Storybook static
        run: |
          pnpm dlx http-server storybook-static -p 6006 --silent &
          sleep 3
      - name: Run Storybook test-runner (per-story axe)
        env:
          STORYBOOK_URL: http://127.0.0.1:6006
        run: pnpm storybook:test --url "$STORYBOOK_URL"
      - name: Run Playwright axe project
        env:
          STORYBOOK_URL: http://127.0.0.1:6006
        run: pnpm test:a11y
      - name: Upload axe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-${{ github.run_id }}
          path: |
            playwright-report
            test-results
